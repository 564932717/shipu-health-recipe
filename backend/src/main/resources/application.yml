server:
  port: 8080
  address: 0.0.0.0
spring:
  application:
    name: health-recipe
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/health_recipe?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true

ai:
  api-key: ${DEEPSEEK_API_KEY:}
  model: deepseek-v4-flash
  base-url: https://api.deepseek.com

logging:
  level:
    com.xd.healthrecipe: debug
