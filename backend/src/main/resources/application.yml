server:
  port: 8080

spring:
  application:
    name: health-recipe
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/health_recipe?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true

logging:
  level:
    com.xd.healthrecipe: info
